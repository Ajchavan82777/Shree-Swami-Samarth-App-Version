services:
  - type: web
    name: sss-catering-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app   # Replace with your Vercel URL
      - key: PYTHON_VERSION
        value: 3.11.0
